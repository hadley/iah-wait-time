on:
  workflow_dispatch:
  push:
  schedule:
    # Every 10 minutes from 4am to 10pm CT (9am to 3am UTC)
    # Split across two cron entries because cron can't wrap midnight
    - cron: "*/10 9-23 * * *"
    - cron: "*/10 0-3 * * *"

name: scrape

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Check out data
        uses: actions/checkout@v4
        with:
          ref: data
          path: data

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2

      - name: Scrape
        run: Rscript 1-scrape.R

      - name: Collapse
        run: Rscript 2-collapse.R

      - name: Commit and push data
        run: |
          cd data
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Data from ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git push
