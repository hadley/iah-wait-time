on:
  workflow_dispatch:
  push:
  schedule:
    # Every 10 minutes from 4am to 10pm CT (9am to 3am UTC)
    # Split across two cron entries because cron can't wrap midnight
    - cron: "*/10 9-23 * * *"
    - cron: "*/10 0-3 * * *"

name: scrape

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2

      - name: Scrape
        run: Rscript 1-scrape.R

      - name: Collapse
        run: Rscript 2-collapse.R

      - name: Commit
        run: |
          MSG="
          Data from ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          "
          echo "MSG<<EOF" >> $GITHUB_ENV
          echo "$MSG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: ${{ env.MSG }}
